<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050807">
  <title>Сканер інвентаризації v4.2 LITE</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #050807;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    body { min-height: 100dvh; }
    button, input { font: inherit; }

    .app {
      width: min(720px, 100%);
      min-height: 100dvh;
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto minmax(300px, 1fr) auto auto;
      background: #050807;
    }

    .top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 9px 10px;
      background: #111714;
      border-bottom: 1px solid #334039;
    }
    .name {
      font-size: 16px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sub {
      margin-top: 2px;
      color: #aeb8b2;
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .pill {
      padding: 6px 8px;
      border-radius: 6px;
      background: #1d3026;
      color: #b8f2ce;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .camera {
      position: relative;
      min-height: 300px;
      overflow: hidden;
      background: #000;
      contain: strict;
    }
    video {
      width: 100%;
      height: 100%;
      min-height: 300px;
      display: block;
      object-fit: cover;
      background: #000;
    }
    .frame {
      position: absolute;
      left: 5%;
      right: 5%;
      top: 50%;
      height: 31%;
      transform: translateY(-50%);
      border: 2px solid #20db73;
      pointer-events: none;
    }
    .guide {
      position: absolute;
      left: 5%;
      right: 5%;
      top: 50%;
      height: 1px;
      background: #20db73;
      pointer-events: none;
    }
    .distance {
      position: absolute;
      left: 50%;
      bottom: 8px;
      transform: translateX(-50%);
      padding: 5px 8px;
      background: rgba(0,0,0,.72);
      border-radius: 5px;
      font-size: 11px;
      white-space: nowrap;
      pointer-events: none;
    }

    .status {
      padding: 9px 10px;
      background: #111714;
      border-top: 1px solid #334039;
      border-bottom: 1px solid #334039;
      min-height: 65px;
    }
    .statusTitle {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.25;
    }
    .statusMeta {
      margin-top: 3px;
      color: #aeb8b2;
      font-size: 11px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    .ok { border-left: 4px solid #20db73; }
    .warn { border-left: 4px solid #e0a229; }
    .err { border-left: 4px solid #d94343; }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      padding: 8px;
      background: #0c110f;
    }
    button {
      border: 0;
      border-radius: 7px;
      padding: 11px 6px;
      color: #fff;
      background: #3c4741;
      font-weight: 700;
      font-size: 13px;
    }
    button:disabled { opacity: .45; }
    .green { background: #087b43; }
    .red { background: #a92a2a; }

    .manual {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
      padding: 0 8px 8px;
      background: #0c110f;
    }
    input {
      min-width: 0;
      border: 1px solid #5c6862;
      border-radius: 7px;
      padding: 10px;
      background: #fff;
      color: #111;
      font-size: 15px;
    }

    @media (max-width: 430px) {
      .app { grid-template-rows: auto minmax(340px, 1fr) auto auto; }
      .camera, video { min-height: 340px; }
      .controls { grid-template-columns: 1fr 1fr; }
      .controls .close { grid-column: 1 / -1; }
      .manual { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div>
        <div id="sessionName" class="name">Інвентаризація</div>
        <div id="sessionLocation" class="sub"></div>
      </div>
      <div id="pill" class="pill">Запуск…</div>
    </header>

    <section class="camera">
      <video id="video" playsinline muted></video>
      <div class="frame"></div>
      <div class="guide"></div>
      <div id="distance" class="distance">Тримай код на 8–12 см</div>
    </section>

    <section id="status" class="status">
      <div id="statusTitle" class="statusTitle">Відкриваємо камеру…</div>
      <div id="statusMeta" class="statusMeta">Без анімації, мінімальне навантаження</div>
    </section>

    <section>
      <div class="controls">
        <button id="torchBtn" onclick="toggleTorch()" disabled>Ліхтарик</button>
        <button id="pauseBtn" class="green" onclick="togglePause()">Пауза</button>
        <button class="red close" onclick="closeScanner()">Закрити</button>
      </div>
      <div class="manual">
        <input id="manualBarcode" inputmode="numeric" placeholder="Штрих-код вручну" onkeydown="manualKeydown(event)">
        <button class="green" onclick="submitManual()">+1</button>
      </div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const apiUrl = params.get('api') || '';
    const apiToken = params.get('token') || '';
    const sessionId = params.get('session') || '';
    const returnUrl = params.get('returnUrl') || '';

    document.getElementById('sessionName').textContent = params.get('name') || 'Інвентаризація';
    document.getElementById('sessionLocation').textContent = params.get('location') || '';

    const TARGET_FOCUS_METERS = 0.10;
    const DETECT_INTERVAL_MS = 230;
    const UNBLOCK_AFTER_MS = 650;

    let stream = null;
    let detector = null;
    let detectorTimer = null;
    let detectorBusy = false;
    let paused = false;
    let blockedCode = '';
    let lastCodeSeenAt = 0;
    let apiBusy = false;
    let retryTimer = null;
    let torchOn = false;
    let focusLabel = 'Фокус: авто';

    const canvas = document.createElement('canvas');
    canvas.width = 480;
    canvas.height = 150;
    const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });

    const queueStorageKey = 'inventoryScannerQueue:' + sessionId;
    let scanQueue = loadQueue();

    function text(id, value) {
      const el = document.getElementById(id);
      if (el && el.textContent !== String(value || '')) el.textContent = value || '';
    }

    function setStatus(type, title, meta) {
      const box = document.getElementById('status');
      box.className = 'status' + (type ? ' ' + type : '');
      text('statusTitle', title);
      text('statusMeta', meta);
    }

    function updatePill() {
      text('pill', apiBusy || scanQueue.length ? 'Черга: ' + scanQueue.length : focusLabel);
    }

    function normalizeBarcode(value) {
      return String(value || '').trim().replace(/\s+/g, '');
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function nearestStep(value, min, step) {
      if (!Number.isFinite(step) || step <= 0) return value;
      return min + Math.round((value - min) / step) * step;
    }

    function jsonpRequest(action, extra) {
      return new Promise((resolve, reject) => {
        if (!apiUrl || !apiToken || !sessionId) {
          reject(new Error('Немає параметрів підключення'));
          return;
        }

        const callbackName = '__scan_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
        const script = document.createElement('script');
        const timeout = setTimeout(() => cleanup(new Error('Сервер не відповів')), 18000);

        function cleanup(error, data) {
          clearTimeout(timeout);
          delete window[callbackName];
          script.remove();
          error ? reject(error) : resolve(data);
        }

        window[callbackName] = payload => {
          if (!payload || payload.ok !== true) {
            cleanup(new Error(payload && payload.error ? payload.error : 'Помилка сервера'));
            return;
          }
          cleanup(null, payload.result);
        };

        const url = new URL(apiUrl);
        url.searchParams.set('inventoryApi', '1');
        url.searchParams.set('action', action);
        url.searchParams.set('session', sessionId);
        url.searchParams.set('token', apiToken);
        url.searchParams.set('callback', callbackName);
        Object.entries(extra || {}).forEach(([key, value]) => url.searchParams.set(key, String(value)));

        script.onerror = () => cleanup(new Error('Немає зв’язку з Apps Script'));
        script.src = url.toString();
        document.head.appendChild(script);
      });
    }

    async function startCamera() {
      if (!navigator.mediaDevices?.getUserMedia) {
        setStatus('err', 'Камера недоступна', 'Відкрий сторінку у Chrome через HTTPS');
        return;
      }

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          audio: false,
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 640, max: 960 },
            height: { ideal: 480, max: 540 },
            frameRate: { ideal: 15, max: 20 },
            resizeMode: { ideal: 'crop-and-scale' }
          }
        });

        const video = document.getElementById('video');
        video.srcObject = stream;
        await video.play();

        await configureFixedFocus();
        configureTorch();

        if ('BarcodeDetector' in window) {
          const supported = BarcodeDetector.getSupportedFormats
            ? await BarcodeDetector.getSupportedFormats()
            : ['ean_13'];
          const wanted = ['ean_13', 'ean_8', 'upc_a', 'code_128'];
          const formats = wanted.filter(format => supported.includes(format));
          detector = new BarcodeDetector({ formats: formats.length ? formats : undefined });
          detectionLoop();
          setStatus('ok', 'Готово до сканування', focusLabel + '. Тримай код на 8–12 см');
        } else {
          await startZxingFallback();
        }

        updatePill();
        processQueue();
      } catch (error) {
        setStatus('err', 'Не вдалося відкрити камеру', error.message || String(error));
      }
    }

    async function configureFixedFocus() {
      const track = getVideoTrack();
      if (!track?.getCapabilities || !track.applyConstraints) {
        focusLabel = 'Фокус: системний';
        return;
      }

      const caps = track.getCapabilities() || {};
      const modes = Array.isArray(caps.focusMode) ? caps.focusMode : [];
      const range = caps.focusDistance;

      try {
        if (modes.includes('manual') && range && Number.isFinite(range.min) && Number.isFinite(range.max)) {
          let target = clamp(TARGET_FOCUS_METERS, range.min, range.max);
          target = nearestStep(target, range.min, Number(range.step || 0));
          target = clamp(target, range.min, range.max);

          await track.applyConstraints({
            advanced: [{ focusMode: 'manual', focusDistance: target }]
          });

          focusLabel = 'Фокус: ' + Math.round(target * 100) + ' см';
          text('distance', 'Фіксований фокус близько ' + Math.round(target * 100) + ' см');
          return;
        }

        if (modes.includes('single-shot')) {
          await track.applyConstraints({ advanced: [{ focusMode: 'single-shot' }] });
          focusLabel = 'Фокус: одноразовий';
          text('distance', 'Фокус зафіксовано після запуску · 8–12 см');
          return;
        }

        if (modes.includes('none')) {
          await track.applyConstraints({ advanced: [{ focusMode: 'none' }] });
          focusLabel = 'Фокус: без авто';
          return;
        }

        focusLabel = 'Фокус: системний';
        text('distance', 'Ручний фокус не підтримується · тримай 8–12 см');
      } catch (error) {
        focusLabel = 'Фокус: системний';
        text('distance', 'Телефон не прийняв ручний фокус · тримай 8–12 см');
      }
    }

    function drawCrop() {
      const video = document.getElementById('video');
      const sw = video.videoWidth || 640;
      const sh = video.videoHeight || 480;
      const cw = Math.floor(sw * 0.90);
      const ch = Math.floor(sh * 0.30);
      const sx = Math.floor((sw - cw) / 2);
      const sy = Math.floor((sh - ch) / 2);
      ctx.drawImage(video, sx, sy, cw, ch, 0, 0, canvas.width, canvas.height);
      return canvas;
    }

    async function detectionLoop() {
      if (!detector || !stream) return;

      if (!paused && !detectorBusy) {
        detectorBusy = true;
        try {
          const results = await detector.detect(drawCrop());
          if (results?.length) {
            lastCodeSeenAt = Date.now();
            const code = normalizeBarcode(results[0].rawValue);
            if (code && code !== blockedCode) queueCode(code);
          } else if (blockedCode && Date.now() - lastCodeSeenAt > UNBLOCK_AFTER_MS) {
            blockedCode = '';
          }
        } catch (_) {
          // Один невдалий кадр ігноруємо.
        } finally {
          detectorBusy = false;
        }
      }

      detectorTimer = setTimeout(detectionLoop, DETECT_INTERVAL_MS);
    }

    async function startZxingFallback() {
      setStatus('warn', 'Завантажуємо резервний декодер', 'На цьому телефоні немає системного BarcodeDetector');
      await loadScript('https://unpkg.com/@zxing/browser@0.1.5/umd/index.min.js');
      if (!window.ZXingBrowser) throw new Error('Не завантажився декодер');

      const reader = new ZXingBrowser.BrowserMultiFormatReader(undefined, {
        delayBetweenScanAttempts: 250,
        delayBetweenScanSuccess: 500
      });
      const video = document.getElementById('video');
      const controls = await reader.decodeFromVideoElement(video, (result) => {
        if (paused || !result) return;
        const code = normalizeBarcode(result.getText ? result.getText() : String(result));
        if (code && code !== blockedCode) queueCode(code);
      });
      window.__zxingControls = controls;
      setStatus('ok', 'Готово до сканування', focusLabel + '. Резервний декодер');
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = src;
        script.async = true;
        script.onload = resolve;
        script.onerror = () => reject(new Error('Не вдалося завантажити бібліотеку'));
        document.head.appendChild(script);
      });
    }

    function loadQueue() {
      try {
        const value = JSON.parse(localStorage.getItem(queueStorageKey) || '[]');
        return Array.isArray(value) ? value : [];
      } catch (_) {
        return [];
      }
    }

    function saveQueue() {
      try { localStorage.setItem(queueStorageKey, JSON.stringify(scanQueue)); } catch (_) {}
    }

    function queueCode(code) {
      if (!code || paused) return;
      blockedCode = code;
      lastCodeSeenAt = Date.now();

      scanQueue.push({ code, attempts: 0, createdAt: Date.now() });
      saveQueue();
      updatePill();
      setStatus('ok', 'Код прийнято: ' + code, 'Відведи код із рамки та наведи наступний');
      if (navigator.vibrate) navigator.vibrate(35);
      processQueue();
    }

    async function processQueue() {
      if (apiBusy || !scanQueue.length) {
        updatePill();
        return;
      }

      clearTimeout(retryTimer);
      apiBusy = true;
      updatePill();
      const item = scanQueue[0];
      item.attempts = Number(item.attempts || 0) + 1;
      saveQueue();

      try {
        const result = await jsonpRequest('scan', { barcode: item.code });
        if (result.status === 'found') {
          setStatus('ok', result.name || 'Товар знайдено', item.code + ' · фактично: ' + Number(result.actualQty || 0));
        } else {
          setStatus('warn', 'Невідомий код: ' + item.code, 'Записано до нерозпізнаних · кількість: ' + Number(result.unknownQty || 0));
        }
        scanQueue.shift();
        saveQueue();
      } catch (error) {
        setStatus('err', 'Немає зв’язку', item.code + ' лишився в черзі · спроба ' + item.attempts);
      } finally {
        apiBusy = false;
        updatePill();
      }

      if (scanQueue.length) {
        retryTimer = setTimeout(processQueue, 120);
      }
    }

    function getVideoTrack() {
      const active = stream || document.getElementById('video').srcObject;
      return active?.getVideoTracks ? active.getVideoTracks()[0] : null;
    }

    function configureTorch() {
      const track = getVideoTrack();
      const caps = track?.getCapabilities ? track.getCapabilities() : {};
      document.getElementById('torchBtn').disabled = !caps.torch;
    }

    async function toggleTorch() {
      const track = getVideoTrack();
      if (!track) return;
      try {
        torchOn = !torchOn;
        await track.applyConstraints({ advanced: [{ torch: torchOn }] });
        text('torchBtn', torchOn ? 'Вимкнути світло' : 'Ліхтарик');
      } catch (_) {
        torchOn = false;
        text('torchBtn', 'Недоступно');
        document.getElementById('torchBtn').disabled = true;
      }
    }

    function togglePause() {
      paused = !paused;
      text('pauseBtn', paused ? 'Продовжити' : 'Пауза');
      if (!paused) blockedCode = '';
      setStatus('', paused ? 'Сканування призупинено' : 'Сканування продовжено', focusLabel);
    }

    function manualKeydown(event) {
      if (event.key === 'Enter') submitManual();
    }

    function submitManual() {
      const input = document.getElementById('manualBarcode');
      const code = normalizeBarcode(input.value);
      if (!code) return;
      input.value = '';
      blockedCode = '';
      queueCode(code);
    }

    function closeScanner() {
      stopCamera();
      if (window.opener) window.close();
      if (returnUrl) location.href = returnUrl;
    }

    function stopCamera() {
      clearTimeout(detectorTimer);
      clearTimeout(retryTimer);
      detectorTimer = null;
      detector = null;
      try { window.__zxingControls?.stop?.(); } catch (_) {}
      const active = stream || document.getElementById('video').srcObject;
      active?.getTracks?.().forEach(track => track.stop());
      stream = null;
    }

    window.addEventListener('beforeunload', stopCamera);
    startCamera();
    processQueue();
  </script>
</body>
</html>
